apiVersion: batch/v1
kind: Job
metadata:
  name: migrations
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-redis
          image: ghcr.io/sikalabs/slu:v0.100.0
          command:
            - /bin/sh
            - -c
            - exec slu wait-for tcp --address redis:6379
      containers:
        - name: migrations
          image: redis:8
          command:
            - /bin/sh
            - -c
            - 'echo Start && redis-cli -h redis incrby counter 500000 && sleep 5 && redis-cli  -h redis incrby counter 500000 && echo Done'

