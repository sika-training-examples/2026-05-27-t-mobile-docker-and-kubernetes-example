apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backups
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: haproxy
  tls:
    - hosts:
        - {{ .Values.host }}
      secretName: {{ .Values.host }}-tls
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: /backups
            pathType: Prefix
            backend:
              service:
                name: backups
                port:
                  number: 80
