apiVersion: v1
kind: ConfigMap
metadata:
  name: backups
data:
  tergum.yaml: |
    Meta:
      SchemaVersion: 3
    Telemetry:
      CollectBackupLog: true
    Backups:
      - ID: redis
        Source:
          Redis:
            Host: redis
            Port: 6379
        Targets:
          - ID: filepath
            FilePath:
              Path: /backups/tergum/redis-dump-latest.rdb
          - ID: file
            File:
              Dir: /backups/tergum/all
              Prefix: redis-dump
              Suffix: rdb
