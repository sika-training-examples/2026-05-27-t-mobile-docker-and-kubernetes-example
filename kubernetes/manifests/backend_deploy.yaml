apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 4
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ttl.sh/ondrejsika/counter/backend
          env:
            - name: REDIS
              value: redis
          livenessProbe:
            httpGet:
              path: /livez
              port: 8000
            failureThreshold: 1
            periodSeconds: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            failureThreshold: 1
            periodSeconds: 1
          startupProbe:
            httpGet:
              path: /readyz
              port: 8000
            failureThreshold: 10
            periodSeconds: 1
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 20Mi
            limits:
              cpu: 100m
              memory: 40Mi
